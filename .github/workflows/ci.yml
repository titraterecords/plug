name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm type-check
      - run: pnpm lint
      - run: pnpm test

  check-mac:
    runs-on: macos-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Build CLI
        run: cd apps/cli && pnpm build

      - name: e2e - PKG/DMG install tests (vitest)
        run: cd apps/cli && pnpm test:e2e

      - name: e2e - install OTT via built CLI
        env:
          PLUG_HOME: ${{ runner.temp }}/plug-e2e
        run: |
          cd apps/cli && node dist/index.js install ott -f vst3
          test -d "$PLUG_HOME/plugins/vst3/OTT.vst3" || (echo "OTT.vst3 not found" && exit 1)
          echo "OTT.vst3 installed successfully"

  check-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - run: pnpm type-check
      - run: pnpm test

      - name: Build CLI
        run: cd apps/cli && pnpm build

      - name: e2e - install from zip (wolf-shaper)
        shell: pwsh
        env:
          PLUG_HOME: ${{ runner.temp }}\plug-e2e-zip
        run: |
          cd apps/cli; node dist/index.js install wolf-shaper -f vst3
          if (!(Test-Path "$env:PLUG_HOME\plugins\vst3\wolf-shaper.vst3")) {
            Write-Error "wolf-shaper.vst3 not found after install"
            exit 1
          }
          Write-Host "wolf-shaper.vst3 installed successfully"

      - name: e2e - install from exe (OTT)
        shell: pwsh
        env:
          PLUG_HOME: ${{ runner.temp }}\plug-e2e-exe
        run: |
          cd apps/cli; node dist/index.js install ott -f vst3
          if (!(Test-Path "$env:PLUG_HOME\plugins\vst3\OTT.vst3")) {
            Write-Error "OTT.vst3 not found after install"
            exit 1
          }
          Write-Host "OTT.vst3 installed successfully"

      - name: e2e - auto-install 7-Zip via winget
        shell: pwsh
        env:
          PLUG_HOME: ${{ runner.temp }}\plug-e2e-winget
        run: |
          # Properly uninstall 7-Zip so winget auto-install is exercised
          winget uninstall 7zip.7zip --accept-source-agreements --silent 2>$null
          Remove-Item "C:\Program Files\7-Zip" -Recurse -Force -ErrorAction SilentlyContinue
          cd apps/cli; node dist/index.js install ott -f vst3
          if (!(Test-Path "$env:PLUG_HOME\plugins\vst3\OTT.vst3")) {
            Write-Error "OTT.vst3 not found after auto-install of 7-Zip"
            exit 1
          }
          Write-Host "OTT.vst3 installed successfully (7-Zip auto-installed via winget)"
