name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: plug-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: plug-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: plug-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: plug-linux-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: plug-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install
        working-directory: apps/cli

      - name: Build binary
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}
        working-directory: apps/cli

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/cli/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
